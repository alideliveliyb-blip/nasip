<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Tekamül Analiz Motoru</title>
    <style>
        :root {
            --gold: #b8860b; --bg: #f8fafc; --card: #ffffff;
            --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --azam: #8e44ad;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 95%; max-width: 900px; background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e2e8f0; }
        .logo { font-size: 55px; font-weight: bold; color: var(--gold); letter-spacing: 6px; margin-bottom: 5px; }
        .kba-sub { font-size: 13px; color: #94a3b8; letter-spacing: 3px; margin-bottom: 30px; font-weight: 600; text-transform: uppercase; }

        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input { background: #fff; border: 2px solid #e2e8f0; padding: 16px; color: #1e293b; border-radius: 12px; margin: 10px; width: 80%; font-size: 16px; text-align: center; }
        .btn { background: var(--gold); color: white; border: none; padding: 18px 45px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 25px; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #966d09; transform: translateY(-2px); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px; margin-top: 35px; }
        .house-node { background: #fff; border: 1px solid #f1f5f9; padding: 22px; border-radius: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        
        /* Renk Tonları - Senin İsteğin Üzere Düzenlendi */
        .node-olur { border-bottom: 5px solid var(--olur); }
        .node-sikinti { border-bottom: 5px solid var(--sikinti); background: #fffaf0; }
        .node-olmaz { border-bottom: 5px solid var(--olmaz); background: #fff5f5; }
        .node-azam { border-bottom: 5px solid var(--azam); background: #fdfaff; font-weight: bold; box-shadow: 0 0 15px rgba(142, 68, 173, 0.2); }

        .detail-view { background: #fff; border: 2px solid var(--gold); padding: 30px; margin-top: 30px; border-radius: 20px; text-align: left; }
        .badge { padding: 6px 14px; border-radius: 8px; font-weight: bold; font-size: 12px; color: white; text-transform: uppercase; }
        .bg-azam { background: var(--azam); } .bg-olur { background: var(--olur); }
        .bg-sikinti { background: var(--sikinti); } .bg-olmaz { background: var(--olmaz); }

        .info-box { margin-top: 15px; padding: 15px; background: #f8fafc; border-radius: 10px; border-left: 4px solid #cbd5e1; font-size: 14px; line-height: 1.6; }
        footer { margin-top: 50px; font-size: 11px; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sc1" class="screen active">
        <div class="logo">KBA</div>
        <div class="kba-sub">TEKAMÜL ANALİZ MOTORU</div>
        <button class="btn" onclick="show(2)">SİSTEMİ AÇ</button>
    </div>

    <div id="sc2" class="screen">
        <h3>ANALİZ VERİLERİ</h3>
        <input type="text" id="uName" placeholder="Adınız ve Soyadınız">
        <input type="date" id="uDate">
        <br>
        <button class="btn" onclick="runKBA()">HESAPLA</button>
    </div>

    <div id="sc3" class="screen">
        <h2 id="welcome" style="color: var(--gold);"></h2>
        <div class="grid-container" id="nodes"></div>
        <div id="details"></div>
        <button class="btn" onclick="location.reload()" style="background: #64748b; margin-top: 40px;">YENİ ANALİZ</button>
    </div>

    <footer>Kendilik Bilinci Akademisi © 2026 | TR-Diyanet Uyumlu Takvim</footer>
</div>

<script>
    // Türkiye (Diyanet) Uyumlu Hassas Hicri Çeviri
    function getHicriDay(date) {
        let d = date.getDate(); let m = date.getMonth() + 1; let y = date.getFullYear();
        let jd = Math.floor((1461 * (y + 4800 + Math.floor((m - 14) / 12))) / 4) +
                 Math.floor((367 * (m - 2 - 12 * (Math.floor((m - 14) / 12)))) / 12) -
                 Math.floor((3 * (Math.floor((y + 4900 + Math.floor((m - 14) / 12)) / 100))) / 4) + d - 32075;
        let l = jd - 1948440 + 10632; let n = Math.floor((l - 1) / 10631); l = l - 10631 * n + 354;
        let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
        l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
        let d_h = l - Math.floor((709 * Math.floor((24 * l) / 709)) / 24);
        // TR Takvim Uyumu İçin Hassas Düzeltme
        return (d_h + 1) > 30 ? 1 : (d_h + 1);
    }

    const config = [
        { g: "Mars", t: "Şahsiyet", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Rızık", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Merkür", t: "İletişim", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Ay", t: "Aile", esma: "Ya Rahman Ya Rahim", evre: "AyMars" },
        { g: "Güneş", t: "Neşe", esma: "Ya Hay Ya Kayyum", evre: "VGJ" },
        { g: "Merkür", t: "Hizmet", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Mars", t: "Ortaklık", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Dönüşüm", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Jüpiter", t: "Vizyon", esma: "Ya Kebir Ya Müteal", evre: "VGJ" },
        { g: "Satürn", t: "Kariyer", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Satürn", t: "Sosyal", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Jüpiter", t: "Bilinç", esma: "Ya Kebir Ya Müteal", evre: "VGJ" }
    ];

    let results = [];

    function show(s) {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.getElementById('sc' + s).classList.add('active');
    }

    function runKBA() {
        const name = document.getElementById('uName').value;
        const dateStr = document.getElementById('uDate').value;
        if(!name || !dateStr) return;

        const kod = (name.replace(/\s/g, '').length % 9) || 9;
        let nodes = document.getElementById('nodes');
        nodes.innerHTML = "";
        results = [];
        let baseDate = new Date(dateStr);

        config.forEach((h, i) => {
            let evDate = new Date(baseDate);
            evDate.setMonth(evDate.getMonth() + i);
            let hDay = getHicriDay(evDate);
            let status = "";

            if (h.evre === "AyMars") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTILI");
            else if (h.evre === "Mer") status = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTILI" : "OLUR");
            else if (h.evre === "VGJ") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTILI" : "OLMAZ");
            else if (h.evre === "Sat") status = hDay <= 15 ? "GERÇEKLEŞİR" : "GERÇEKLEŞMEZ";

            // AY İsmi Azam Mührü (4. Ev)
            let isAzam = (i === 3); 
            if (isAzam) status = "İSMİ AZAM";

            let nodeCls = status === "OLUR" || status === "GERÇEKLEŞİR" ? "node-olur" : 
                          (status === "SIKINTILI" ? "node-sikinti" : 
                          (status === "İSMİ AZAM" ? "node-azam" : "node-olmaz"));

            results.push({ ...h, status, hDay, kod, id: i+1, isAzam });
            nodes.innerHTML += `<div class="house-node ${nodeCls}" onclick="view(${i})">${i+1}. EV<br><small>${isAzam ? '✨ MÜHÜR' : h.t}</small></div>`;
        });
        document.getElementById('welcome').innerText = name.toUpperCase();
        show(3);
        view(3); // Ay evini (İsmi Azam) otomatik aç
    }

    function view(i) {
        const d = results[i];
        let cls = d.status === "OLUR" || d.status === "GERÇEKLEŞİR" ? "bg-olur" : 
                  (d.status === "SIKINTILI" ? "bg-sikinti" : 
                  (d.status === "İSMİ AZAM" ? "bg-azam" : "bg-olmaz"));
        
        document.getElementById('details').innerHTML = `
            <div class="detail-view">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0; color:var(--gold);">${d.id}. Ev: ${d.t}</h3>
                    <span class="badge ${cls}">${d.status}</span>
                </div>
                <p style="margin:10px 0;"><strong>Yönetici:</strong> ${d.g} | <strong>TR Arabi Gün:</strong> ${d.hDay}</p>
                <div class="info-box">
                    <strong>Esma Terkibi:</strong> ${d.esma}<br>
                    <strong>Mühür Notu:</strong> ${d.isAzam ? 'Bu senin İsmi Azam alanındır. Ay döngüsüyle tekamülün mühürlenir.' : 'Tekamül yolculuğunda bu alanın iradesi sana aittir.'}<br>
                    <strong>Enerji:</strong> ${d.kod % 2 === 0 ? 'Cemal (İçsel Denge)' : 'Celal (Dışsal Kararlılık)'}
                </div>
            </div>`;
    }
</script>
</body>
</html>
