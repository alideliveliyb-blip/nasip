<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Kusursuz Tekamül Analizi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b8860b; --bg: #f4f7f6; --card: #ffffff;
            --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --azam: #8e44ad;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #2d3436; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 850px; background: var(--card); margin: 10px auto; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        
        /* MÜHÜR EFEKTİ */
        .node-azam { 
            background: linear-gradient(135deg, #fdfaff 0%, #f3e5f5 100%) !important; 
            border: 3px solid var(--azam) !important;
            box-shadow: 0 10px 20px rgba(142, 68, 173, 0.2);
            transform: scale(1.05);
            z-index: 5;
        }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .house-node { background: #fff; border: 1px solid #eee; padding: 18px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); }

        .header-card { text-align: center; background: #f8f9fa; padding: 20px; border-radius: 20px; border: 1px solid #eee; margin-bottom: 15px; }
        .header-card h2 { color: var(--gold); margin: 0; text-transform: uppercase; font-size: 24px; }
        
        .analysis-detail { background: #fff; border: 2px solid var(--gold); padding: 25px; border-radius: 25px; margin-top: 20px; animation: slideUp 0.4s ease; }
        .info-box { background: #f9fbfa; padding: 18px; border-radius: 18px; border-left: 6px solid var(--gold); margin-top: 15px; line-height: 1.6; font-size: 14px; }
        
        .wa-btn { background: #25d366; color: white; padding: 20px; border-radius: 18px; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-weight: 700; margin-top: 25px; transition: 0.3s; }
        .wa-btn:hover { transform: scale(1.02); background: #1ebd59; }

        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; text-align: center; font-size: 16px; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 18px 60px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 90%; margin-top: 10px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sc1" class="screen" style="text-align: center;">
        <h1 style="color:var(--gold); letter-spacing: 2px;">KBA TEKAMÜL ANALİZİ</h1>
        <input type="text" id="uName" placeholder="AD SOYAD">
        <input type="number" id="uEbced" placeholder="EBCED DEĞERİ">
        <input type="date" id="uBirth">
        <button class="btn-main" onclick="runAnalysis()">ANALİZİ BAŞLAT</button>
    </div>

    <div id="sc2" class="screen" style="display:none;">
        <div class="header-card">
            <h2 id="dispName"></h2>
            <div id="dispMeta" style="color:#7f8c8d; font-size:14px; margin-top:5px;"></div>
            <div id="dispKod" style="margin-top:8px; font-weight:bold; color:var(--gold);"></div>
        </div>
        <div class="grid-container" id="grid"></div>
        <div id="detailArea"></div>
        <div id="waArea"></div>
        <button onclick="location.reload()" style="width:100%; margin-top:20px; padding:15px; border:none; border-radius:12px; background:#f1f2f6; cursor:pointer; font-weight:bold;">YENİ ANALİZ</button>
    </div>
</div>

<script>
    const burclar = ["Koç", "Boğa", "İkizler", "Yengeç", "Aslan", "Başak", "Terazi", "Akrep", "Yay", "Oğlak", "Kova", "Balık"];
    
    const evTemalari = [
        { t: "Şahsiyet", g: "Mars", sor: { "Koç": "Benlik çatışması ve öfke", "Boğa": "İnatçılık ve konfor hırsı", "İkizler": "Zihinsel dağınıklık", "varsayilan": "Kimlik karmaşası" } },
        { t: "Rızık", g: "Venüs", sor: { "Boğa": "Maddi kayıp korkusu", "Terazi": "Aşırı harcama", "varsayilan": "Bereket tıkanıklığı" } },
        { t: "İletişim", g: "Merkür", sor: { "İkizler": "Dedikodu ve yanlış anlama", "Başak": "Aşırı eleştiri", "varsayilan": "Kendini ifade edememe" } },
        { t: "Aile/Ev", g: "Ay", sor: { "Yengeç": "Geçmişe takılı kalma", "Oğlak": "Ailevi soğukluk", "varsayilan": "Aidiyet sorunu" } },
        { t: "Neşe/Aşk", g: "Güneş", sor: { "Aslan": "Ego savaşları", "Kova": "Duygusal kopukluk", "varsayilan": "Mutsuzluk ve kısırlık" } },
        { t: "Hizmet/Sağlık", g: "Merkür", sor: { "Başak": "Hastalık hastalığı", "Balık": "Kaos ve düzensizlik", "varsayilan": "İş hayatında baskı" } },
        { t: "Ortaklık", g: "Venüs", sor: { "Terazi": "Kararsızlık ve bağımlılık", "Koç": "İlişkide bencil tavır", "varsayilan": "Eşle çatışma" } },
        { t: "Dönüşüm", g: "Mars", sor: { "Akrep": "Krizleri yönetememe", "Boğa": "Değişim direnci", "varsayilan": "Maddi/Manevi kriz" } },
        { t: "Vizyon", g: "Jüpiter", sor: { "Yay": "Fanatizm ve dogmalar", "İkizler": "İnançsızlık", "varsayilan": "Yolunu kaybetme" } },
        { t: "Kariyer", g: "Satürn", sor: { "Oğlak": "Yalnızlık ve statü kaybı", "Yengeç": "İş-ev dengesizliği", "varsayilan": "Başarısızlık hissi" } },
        { t: "Sosyal", g: "Satürn", sor: { "Kova": "Dışlanma ve yalnızlık", "Aslan": "Onaylanma ihtiyacı", "varsayilan": "Sosyal fobi" } },
        { t: "Bilinçaltı", g: "Jüpiter", sor: { "Balık": "Gerçeklerden kaçış", "Başak": "Aşırı kaygı", "varsayilan": "Gizli düşmanlıklar" } }
    ];

    const esmalar = { "Mars": "Ya Malik Ya Kuddüs", "Venüs": "Ya Kafi Ya Gani", "Merkür": "Ya Ali Ya Azim", "Ay": "Ya Rahman Ya Rahim", "Güneş": "Ya Hay Ya Kayyum", "Jüpiter": "Ya Kebir Ya Müteal", "Satürn": "Ya Fettah Ya Rezzak" };

    function getZodiac(date) {
        const d = new Date(date);
        const m = d.getMonth() + 1, dy = d.getDate();
        if ((m == 3 && dy >= 21) || (m == 4 && dy <= 19)) return "Koç";
        if ((m == 4 && dy >= 20) || (m == 5 && dy <= 20)) return "Boğa";
        if ((m == 5 && dy >= 21) || (m == 6 && dy <= 20)) return "İkizler";
        if ((m == 6 && dy >= 21) || (m == 7 && dy <= 22)) return "Yengeç";
        if ((m == 7 && dy >= 23) || (m == 8 && dy <= 22)) return "Aslan";
        if ((m == 8 && dy >= 23) || (m == 9 && dy <= 22)) return "Başak";
        if ((m == 9 && dy >= 23) || (m == 10 && dy <= 22)) return "Terazi";
        if ((m == 10 && dy >= 23) || (m == 11 && dy <= 21)) return "Akrep";
        if ((m == 11 && dy >= 22) || (m == 12 && dy <= 21)) return "Yay";
        if ((m == 12 && dy >= 22) || (m == 1 && dy <= 19)) return "Oğlak";
        if ((m == 1 && dy >= 20) || (m == 2 && dy <= 18)) return "Kova";
        return "Balık";
    }

    let report = [];
    let userKod = 0;
    let userBurc = "";

    function runAnalysis() {
        const name = document.getElementById('uName').value;
        const ebced = document.getElementById('uEbced').value;
        const birth = document.getElementById('uBirth').value;
        if(!name || !ebced || !birth) return alert("Eksik bilgi!");

        userKod = (parseInt(ebced) % 9) || 9;
        userBurc = getZodiac(birth);
        
        document.getElementById('sc1').style.display = 'none';
        document.getElementById('sc2').style.display = 'block';
        document.getElementById('dispName').innerText = name.toUpperCase();
        document.getElementById('dispMeta').innerText = `${birth.split("-").reverse().join(".")} | ${userBurc} Burcu`;
        document.getElementById('dispKod').innerText = "KBA KADER KODU: " + userKod;

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        report = [];

        for(let i=0; i<12; i++) {
            const ev = evTemalari[i];
            const d = new Date(birth);
            // EVRE (Nitelik) HESABI
            let nite = ((d.getDate() + i + userKod) % 3 === 0) ? "OLUR" : (((d.getDate() + i + userKod) % 3 === 1) ? "SIKINTILI" : "OLMAZ");
            
            // İSMİ AZAM (MÜHÜR)
            if(userKod === 9 && ev.g === "Mars") nite = "İSMİ AZAM";
            else if((i + 1 + userKod) % 7 === 0) nite = "İSMİ AZAM";

            report.push({...ev, nite, evNo: i+1});
            let cls = nite === "İSMİ AZAM" ? "node-azam" : ("node-" + nite.toLowerCase().replace("ı","i"));
            grid.innerHTML += `<div class="house-node ${cls}" onclick="showDetail(${i})"><b>${i+1}. EV</b><br><small>${nite === 'İSMİ AZAM' ? '✨ MÜHÜR' : nite}</small></div>`;
        }
        showDetail(0);
    }

    function showDetail(i) {
        const d = report[i];
        const mizac = ([1,3,9].includes(userKod)) ? "CELAL" : ([2,4,6].includes(userKod) ? "CEMAL" : "İTİDAL");
        
        let sorunTanimi = d.sor[userBurc] || d.sor["varsayilan"];
        let analizMetni = "";

        if(d.nite === "İSMİ AZAM") {
            analizMetni = `Bu yaşam alanı senin için <b>MÜHÜRLÜ</b> bir kaledir. ${userBurc} burcu fıtratın burada en asil halini sergiler. Esma terkibin (${esmalar[d.g]}) seni her türlü dış etkiden korur. Burası senin fetih alanındır.`;
        } 
        else if(d.nite === "OLUR") {
            analizMetni = `<b>Pozitif Akış:</b> ${userBurc} burcunun ${d.t} alanındaki enerjisi şu an itidalde. ${mizac} mizacınla bu dönemi yeni adımlar için kullanabilirsin. ${esmalar[d.g]} zikriyle bereketi sabitleyebilirsin.`;
        } 
        else {
            analizMetni = `<b>TESPİT EDİLEN SORUN:</b> ${userBurc} burcu olarak bu evrede <b>"${sorunTanimi}"</b> üzerine ağır bir imtihan yaşarsın. 
            <br><br><b>Mahiyet (Nicelik):</b> ${mizac === 'CELAL' ? 'Öfke, acele ve baskı (İfrat) nedeniyle işler sarpa sarar.' : 'Korku, kararsızlık ve içe kapanma (Tefrit) nedeniyle fırsatlar kaçar.'}
            <br><br><b>Çözüm:</b> Bu alanı ${esmalar[d.g]} mühürlemeden geçemezsin.`;
        }

        const color = d.nite === "İSMİ AZAM" ? "var(--azam)" : (d.nite === "OLUR" ? "var(--olur)" : "var(--sikinti)");

        document.getElementById('detailArea').innerHTML = `
            <div class="analysis-detail">
                <span style="background:${color}; color:white; padding:6px 16px; border-radius:12px; font-size:12px; font-weight:700;">${d.nite} - ${d.t} Alanı</span>
                <h3 style="margin:12px 0 5px 0;">${d.evNo}. Ev Analizi</h3>
                <div class="info-box">
                    ${analizMetni}
                </div>
            </div>`;

        const waMsg = encodeURIComponent(`${userBurc} burcu olarak ${d.evNo}. evdeki ${d.nite} sorunum (${sorunTanimi}) ve ${userKod} kodum için özel mizaç reçetesi almak istiyorum.`);
        document.getElementById('waArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-btn">DANIŞMANLIK HATTI<span>Detaylı Çözüm İçin Tıklayın</span></a>`;
    }
</script>
</body>
</html>
