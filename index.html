<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Kadim Hicri Analiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b8860b; --azam: #8e44ad; --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --deep-bg: #0f0f13; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 850px; background: #fff; margin: 10px auto; padding: 25px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid #eee; }
        h1, h2, h4 { font-family: 'Cinzel', serif; color: var(--gold); }
        .manifesto { font-size: 13px; font-style: italic; color: #7f8c8d; margin-bottom: 25px; line-height: 1.6; }
        
        .node-azam { background: linear-gradient(135deg, #fdfaff 0%, #f3e5f5 100%) !important; border: 3px solid var(--azam) !important; transform: scale(1.05); z-index: 10; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-top: 25px; }
        .house-box { background: #fff; border: 1px solid #f0f0f0; padding: 18px 5px; border-radius: 25px; text-align: center; cursor: pointer; transition: 0.4s; font-size: 12px; font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); }
        
        .analysis-detail { background: #fff; border: 2px solid var(--gold); padding: 25px; border-radius: 30px; margin-top: 25px; position: relative; overflow: hidden; }
        .analysis-detail::before { content: "✨"; position: absolute; right: 10px; top: 10px; font-size: 40px; opacity: 0.1; }
        .desc-content { background: #fdfcf9; padding: 18px; border-radius: 20px; border-left: 5px solid var(--gold); margin-top: 15px; line-height: 1.7; font-size: 14px; color: #34495e; }
        
        input { width: 85%; padding: 14px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; text-align: center; font-size: 16px; background: #fafafa; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 90%; font-family: 'Cinzel', serif; letter-spacing: 1px; }
        .wa-btn { background: #25d366; color: white; padding: 16px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-top: 20px; box-shadow: 0 5px 15px rgba(37,211,102,0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen1" style="text-align: center;">
        <h1>KBA MANİFESTO</h1>
        <p class="manifesto">"Göklerin ritmi, Arabi döngünün nefesi ve İradenin mührü birleştiğinde; rakamlar yalan söylemez, fıtrat asla şaşmaz."</p>
        <input type="text" id="nameIn" placeholder="İSİM VE SOYİSİM">
        <input type="number" id="ebcedIn" placeholder="EBCED (NİCELİK) DEĞERİ">
        <input type="date" id="birthIn">
        <button class="btn-main" onclick="runKBA()">SIRRI ÇÖZ VE MÜHÜRLE</button>
    </div>

    <div id="screen2" style="display:none;">
        <div id="captureArea" style="padding:15px; background:#fff; border-radius:30px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 id="outName" style="margin:0; letter-spacing: 2px;"></h2>
                <div id="outKod" style="font-weight:800; color:var(--gold); margin-top:10px; font-size:18px;"></div>
                <div id="outMeta" style="font-size:12px; color:#95a5a6; margin-top:5px; text-transform: uppercase;">Zamanın Ruhu ve İrade Analizi</div>
            </div>
            <div class="grid" id="gridHouses"></div>
            <div id="detailView"></div>
        </div>
        <button onclick="saveImage()" style="width:100%; margin-top:20px; padding:15px; background:#2c3e50; color:white; border:none; border-radius:15px; cursor:pointer; font-weight:600; font-family: 'Cinzel', serif;">📷 ANALİZ KARTINI MÜHÜRLE (KAYDET)</button>
        <div id="waBtnArea"></div>
        <button onclick="location.reload()" style="width:100%; margin-top:15px; padding:15px; border:none; border-radius:15px; background:#f0f0f0; cursor:pointer; font-weight:600;">YENİ TEKAMÜL SORGUSU</button>
    </div>
</div>

<script>
    // MİSTİK EV İSİMLERİ VE GEZEGENLER
    const dataHouses = [
        { t: "Zat-ı Şahane (Benlik)", g: "Mars" }, 
        { t: "Beyt-ül Mal (Rızık)", g: "Venüs" }, 
        { t: "Kelâm-ı Kadim (Haber)", g: "Merkür" },
        { t: "Hane-i Saadet (Kök)", g: "Ay" }, 
        { t: "Aşk-ı Muhabbet (Neşe)", g: "Güneş" }, 
        { t: "Sıhhat-ül Şifa (Hizmet)", g: "Merkür" },
        { t: "Vahdet-i Vücud (Eş)", g: "Venüs" }, 
        { t: "Sırr-ı Kadem (Dönüşüm)", g: "Mars" }, 
        { t: "Ufuk-u Hikmet (Vizyon)", g: "Jüpiter" },
        { t: "Makam-ı Mansur (Zirve)", g: "Satürn" }, 
        { t: "Cemaat-i Ülfet (Sosyal)", g: "Satürn" }, 
        { t: "Âlem-i Ervah (Mana)", g: "Jüpiter" }
    ];

    const azamMap = {
        1: ["Venüs", "Güneş"], 2: ["Ay"], 4: ["Ay"], 6: ["Ay"],
        3: ["Merkür", "Jüpiter", "Venüs", "Satürn", "Güneş"],
        5: ["Jüpiter"], 7: ["Jüpiter"], 8: ["Venüs"], 9: ["Mars"]
    };

    const esmalar = { 
        "Mars": "Ya Malik Ya Kuddüs", "Venüs": "Ya Kafi Ya Gani", 
        "Merkür": "Ya Ali Ya Azim", "Ay": "Ya Rahman Ya Rahim", 
        "Güneş": "Ya Hay Ya Kayyum", "Jüpiter": "Ya Kebir Ya Müteal", 
        "Satürn": "Ya Fettah Ya Rezzak" 
    };

    // OTOMATİK HİCRİ HESAP (Her ev için miladi ayı +1 kaydırır)
    function autoHijriDay(miladiDate, offset) {
        let d = new Date(miladiDate.getFullYear(), miladiDate.getMonth() + offset, miladiDate.getDate());
        let dayStr = new Intl.DateTimeFormat('tr-TN-u-ca-islamic-uma-nu-latn', {day: 'numeric'}).format(d);
        return parseInt(dayStr);
    }

    let report = [];
    let userKod = 0;

    function runKBA() {
        const name = document.getElementById('nameIn').value;
        const ebced = document.getElementById('ebcedIn').value;
        const birth = document.getElementById('birthIn').value;
        if(!name || !ebced || !birth) return alert("Sırra ermek için bilgileri tam giriniz.");

        userKod = (parseInt(ebced) % 9) || 9;
        const baseDate = new Date(birth);

        document.getElementById('screen1').style.display = 'none';
        document.getElementById('screen2').style.display = 'block';
        document.getElementById('outName').innerText = name.toUpperCase();
        document.getElementById('outKod').innerText = "KADER KODU: " + userKod;

        const grid = document.getElementById('gridHouses');
        grid.innerHTML = "";
        report = [];

        for(let i=0; i<12; i++) {
            const ev = dataHouses[i];
            let hDay = autoHijriDay(baseDate, i); 
            let nite = "";

            // HİCRİ EVRE KURALLARI (Gezegen Filtreli)
            if (hDay >= 1 && hDay <= 10) {
                nite = (ev.g === "Merkür") ? "OLMAZ" : "OLUR";
            } else if (hDay >= 11 && hDay <= 20) {
                nite = (ev.g === "Ay" || ev.g === "Mars") ? "OLMAZ" : "SIKINTILI";
            } else { // 21-30
                if (ev.g === "Merkür") nite = "OLUR";
                else if (ev.g === "Ay" || ev.g === "Mars") nite = "SIKINTILI";
                else nite = "OLMAZ";
            }
            if (ev.g === "Satürn") nite = (hDay <= 15) ? "OLUR" : "OLMAZ";

            let isAzam = azamMap[userKod] && azamMap[userKod].includes(ev.g);
            report.push({...ev, nite, isAzam, evNo: i+1, hDay: hDay});

            let cls = isAzam ? "node-azam" : ("node-" + nite.toLowerCase().replace("ı","i"));
            grid.innerHTML += `<div class="house-box ${cls}" onclick="showDetail(${i})">
                <span style="font-family:'Cinzel',serif; font-size:10px;">${i+1}. MENZİL</span><br>
                <small>${isAzam ? '✨ MÜHÜRLÜ' : nite}</small><br>
                <span style="font-size:9px; color:#888;">Arabi: ${hDay}</span>
            </div>`;
        }
        showDetail(0);
    }

    function showDetail(i) {
        const d = report[i];
        let statusHtml = d.isAzam ? 
            `<b style="color:var(--azam)">✨ İSMİ AZAM MÜHRÜ:</b> İradeniz bu menzilde göklerin iklimini aşacak güçtedir. Mühür sizdedir.` : 
            `<b>${d.nite} VAKTİ:</b> Arabi döngünün bu menzildeki güncel tecellisidir.`;
        
        document.getElementById('detailView').innerHTML = `
            <div class="analysis-detail">
                <h4 style="margin:0; border-bottom:1px solid #eee; padding-bottom:10px;">${d.t} (${d.g})</h4>
                <div class="desc-content">
                    <strong>Vird-i Şerif:</strong> ${esmalar[d.g]}<br><br>
                    ${statusHtml}<br>
                    <small style="color:#95a5a6; display:block; margin-top:10px; border-top:1px dashed #ddd; padding-top:5px;">
                        Bu menzil, doğumdan ${i} ay sonraki Arabi ${d.hDay}. gün enerjisiyle tartılmıştır.
                    </small>
                </div>
            </div>`;

        const waMsg = encodeURIComponent(`KBA Mistik Analiz: ${d.t} Menzili, Arabi Gün: ${d.hDay}, ${d.isAzam ? 'Mühürlü' : d.nite} durumundadır.`);
        document.getElementById('waBtnArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-btn">🌙 ÖZEL REÇETE VE SIR TALEP ET</a>`;
    }

    function saveImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = `KBA-Tekamul-Karti.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
