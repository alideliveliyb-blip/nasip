<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Profesyonel Tekamül Rehberi</title>
    <style>
        :root {
            --gold: #b8860b; --bg: #f4f7f6; --card: #ffffff;
            --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --azam: #8e44ad;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #2d3436; margin: 0; padding: 20px; }
        .app-container { width: 100%; max-width: 900px; background: var(--card); margin: auto; padding: 35px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #dcdde1; }
        .logo { font-size: 55px; font-weight: 800; color: var(--gold); letter-spacing: 8px; margin-bottom: 5px; text-align: center; }
        .kba-sub { font-size: 14px; color: #7f8c8d; letter-spacing: 4px; margin-bottom: 40px; text-align: center; font-weight: 600; text-transform: uppercase; }

        .screen { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input { width: 85%; padding: 15px; border: 2px solid #edeff2; border-radius: 15px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: #fdfdfd; }

        .btn { background: var(--gold); color: #fff; border: none; padding: 18px 40px; border-radius: 15px; cursor: pointer; font-weight: 700; margin-top: 20px; width: 85%; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #966d09; transform: scale(1.02); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 15px; margin-top: 35px; }
        .house-node { background: #fff; border: 1px solid #f1f2f6; padding: 25px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); background: #fffaf0; }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); background: #fff5f5; }
        .node-azam { border-bottom: 6px solid var(--azam); background: #fdfaff; font-weight: bold; box-shadow: 0 8px 20px rgba(142,68,173,0.15); }

        .detail-view { background: #fff; border: 2px solid var(--gold); padding: 30px; margin-top: 30px; border-radius: 25px; text-align: left; }
        .badge { padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 12px; color: white; text-transform: uppercase; }
        .bg-azam { background: var(--azam); } .bg-olur { background: var(--olur); }
        .bg-sikinti { background: var(--sikinti); } .bg-olmaz { background: var(--olmaz); }

        .mizac-box { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 15px; border-left: 5px solid var(--gold); line-height: 1.6; }
        
        /* WhatsApp Box */
        .wa-box { margin-top: 40px; background: #25d366; color: white; padding: 20px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; box-shadow: 0 10px 20px rgba(37,211,102,0.2); }
        .wa-box:hover { transform: translateY(-3px); background: #1ebd5a; }
        .wa-box i { font-size: 24px; margin-right: 15px; }

        footer { margin-top: 50px; font-size: 12px; color: #bdc3c7; border-top: 1px solid #eee; padding-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sc1" class="screen active">
        <div class="logo">KBA</div>
        <div class="kba-sub">TEKAMÜL VE MİZAÇ ANALİZİ</div>
        <button class="btn" onclick="show(2)">ANALİZİ BAŞLAT</button>
    </div>

    <div id="sc2" class="screen">
        <h3>DANIŞAN BİLGİLERİ</h3>
        <div class="input-group">
            <input type="text" id="uName" placeholder="Adınız Soyadınız">
            <input type="number" id="uEbced" placeholder="İsim Ebced Değeri">
            <input type="date" id="uBirthDate">
        </div>
        <button class="btn" onclick="runKBA()">HESAPLA VE TEŞHİS ET</button>
    </div>

    <div id="sc3" class="screen">
        <h2 id="welcome" style="color: var(--gold); text-align: center;"></h2>
        <div id="kodBilgi" style="text-align: center; font-weight: bold; font-size: 1.1em;"></div>
        
        <div class="grid-container" id="nodes"></div>
        <div id="details"></div>

        <a href="https://wa.me/905337381237" target="_blank" class="wa-box">
            <span>DANIŞMANLIK İÇİN WHATSAPP HATTI</span>
        </a>
        
        <button class="btn" onclick="location.reload()" style="background: #7f8c8d; margin-top: 20px;">YENİ ANALİZ</button>
    </div>

    <footer>KBA © 2026 | Ebced & Mizaç & Gezegen Terkibi</footer>
</div>

<script>
    function getHicriDay(date) {
        let d = date.getDate(); let m = date.getMonth() + 1; let y = date.getFullYear();
        let jd = Math.floor((1461 * (y + 4800 + Math.floor((m - 14) / 12))) / 4) +
                 Math.floor((367 * (m - 2 - 12 * (Math.floor((m - 14) / 12)))) / 12) -
                 Math.floor((3 * (Math.floor((y + 4900 + Math.floor((m - 14) / 12)) / 100))) / 4) + d - 32075;
        let l = jd - 1948440 + 10632; let n = Math.floor((l - 1) / 10631); l = l - 10631 * n + 354;
        let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
        l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
        let d_h = l - Math.floor((709 * Math.floor((24 * l) / 709)) / 24);
        return (d_h + 1) > 30 ? 1 : (d_h + 1);
    }

    function getZodiac(date) {
        const m = date.getMonth() + 1; const d = date.getDate();
        if ((m == 3 && d >= 21) || (m == 4 && d <= 19)) return { id: 0, name: "Koç" };
        if ((m == 4 && d >= 20) || (m == 5 && d <= 20)) return { id: 1, name: "Boğa" };
        if ((m == 5 && d >= 21) || (m == 6 && d <= 20)) return { id: 2, name: "İkizler" };
        if ((m == 6 && d >= 21) || (m == 7 && d <= 22)) return { id: 3, name: "Yengeç" };
        if ((m == 7 && d >= 23) || (m == 8 && d <= 22)) return { id: 4, name: "Aslan" };
        if ((m == 8 && d >= 23) || (m == 9 && d <= 22)) return { id: 5, name: "Başak" };
        if ((m == 9 && d >= 23) || (m == 10 && d <= 22)) return { id: 6, name: "Terazi" };
        if ((m == 10 && d >= 23) || (m == 11 && d <= 21)) return { id: 7, name: "Akrep" };
        if ((m == 11 && d >= 22) || (m == 12 && d <= 21)) return { id: 8, name: "Yay" };
        if ((m == 12 && d >= 22) || (m == 1 && d <= 19)) return { id: 9, name: "Oğlak" };
        if ((m == 1 && d >= 20) || (m == 2 && d <= 18)) return { id: 10, name: "Kova" };
        return { id: 11, name: "Balık" };
    }

    const planetPool = [
        { g: "Mars", t: "Şahsiyet", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Rızık", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Merkür", t: "İletişim", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Ay", t: "Aile", esma: "Ya Rahman Ya Rahim", evre: "AyMars" },
        { g: "Güneş", t: "Neşe", esma: "Ya Hay Ya Kayyum", evre: "VGJ" },
        { g: "Merkür", t: "Hizmet", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Mars", t: "Ortaklık", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Dönüşüm", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Jüpiter", t: "Vizyon", esma: "Ya Kebir Ya Müteal", evre: "VGJ" },
        { g: "Satürn", t: "Kariyer", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Satürn", t: "Sosyal", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Jüpiter", t: "Bilinç", esma: "Ya Kebir Ya Müteal", evre: "VGJ" }
    ];

    let results = [];
    let globalKod = 0;

    function show(s) {
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.getElementById('sc' + s).classList.add('active');
    }

    function getAzamPlanets(kod) {
        if (kod === 1) return ["Venüs", "Güneş"];
        if ([2, 4, 6].includes(kod)) return ["Ay"];
        if (kod === 3) return ["Satürn", "Güneş", "Merkür", "Jüpiter", "Venüs"];
        if ([5, 7].includes(kod)) return ["Jüpiter"];
        if (kod === 8) return ["Venüs"];
        if (kod === 9) return ["Mars"];
        return [];
    }

    function runKBA() {
        const name = document.getElementById('uName').value;
        const ebced = document.getElementById('uEbced').value;
        const birth = document.getElementById('uBirthDate').value;
        if(!name || !ebced || !birth) return;

        globalKod = (parseInt(ebced) % 9) || 9;
        const zodiac = getZodiac(new Date(birth));
        const azamPlanets = getAzamPlanets(globalKod);
        
        let nodes = document.getElementById('nodes');
        nodes.innerHTML = "";
        results = [];

        for(let i=0; i<12; i++) {
            let h = planetPool[(i + zodiac.id) % 12];
            let evDate = new Date(); evDate.setMonth(evDate.getMonth() + i);
            let hDay = getHicriDay(evDate);
            let status = "";

            if (h.evre === "AyMars") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTILI");
            else if (h.evre === "Mer") status = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTILI" : "OLUR");
            else if (h.evre === "VGJ") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTILI" : "OLMAZ");
            else if (h.evre === "Sat") status = hDay <= 15 ? "GERÇEKLEŞİR" : "GERÇEKLEŞMEZ";

            let isAzam = azamPlanets.includes(h.g);
            if (isAzam) status = "İSMİ AZAM";

            let nodeCls = status === "OLUR" || status === "GERÇEKLEŞİR" ? "node-olur" : 
                          (status === "SIKINTILI" ? "node-sikinti" : 
                          (status === "İSMİ AZAM" ? "node-azam" : "node-olmaz"));

            results.push({ ...h, status, hDay, isAzam, evNo: i+1 });
            nodes.innerHTML += `<div class="house-node ${nodeCls}" onclick="view(${i})">${i+1}. EV<br><small>${isAzam ? '✨ MÜHÜR' : h.t}</small></div>`;
        }
        document.getElementById('welcome').innerText = name.toUpperCase();
        document.getElementById('kodBilgi').innerText = "KBA ANALİZ KODU: " + globalKod;
        show(3);
        view(0);
    }

    function view(i) {
        const d = results[i];
        let mizac = ""; let enerji = "";
        
        if([1, 3, 9].includes(globalKod)) { mizac = "Celal (Dışsal Kararlılık)"; enerji = "Aksiyon ve sonuç odaklı bir enerji devrededir."; }
        else if([2, 4, 6].includes(globalKod)) { mizac = "Cemal (İçsel Denge)"; enerji = "Duygusal derinlik ve iç gözlem vaktidir."; }
        else { mizac = "İtidal (Denge)"; enerji = "Sabır ve ölçülü hareket edilmesi gereken bir evre."; }

        let cls = d.status === "OLUR" || d.status === "GERÇEKLEŞİR" ? "bg-olur" : (d.status === "SIKINTILI" ? "bg-sikinti" : (d.status === "İSMİ AZAM" ? "bg-azam" : "bg-olmaz"));
        
        document.getElementById('details').innerHTML = `
            <div class="detail-view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h3 style="margin:0; color:var(--gold);">${d.evNo}. Ev: ${d.t}</h3>
                    <span class="badge ${cls}">${d.status}</span>
                </div>
                <p><strong>Yönetici Gezegen:</strong> ${d.g} | <strong>TR Arabi Gün:</strong> ${d.hDay}</p>
                <div class="mizac-box">
                    <strong>Mizaç Durumu:</strong> ${mizac}<br>
                    <strong>Gezegen & Esma Etkisi:</strong> ${d.esma}<br>
                    <strong>Analiz:</strong> ${enerji} ${d.isAzam ? 'Bu evre sizin için İsmi Azam kapısıdır, duaya ve niyete sarılın.' : ''}
                </div>
                <p style="font-size:13px; color:#7f8c8d; margin-top:10px;">*Bu analiz kişiye özel ebced ve gezegen terkibiyle hazırlanmıştır.</p>
            </div>`;
    }
</script>
</body>
</html>
