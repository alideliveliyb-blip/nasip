<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA Modüler Analiz - Süleyman</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b8860b; --azam: #8e44ad; --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
        .box { padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #ddd; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .mühür { border: 3px solid var(--azam) !important; background: #fdfaff; }
        .olur { border-bottom: 5px solid var(--olur); }
        .sikinti { border-bottom: 5px solid var(--sikinti); }
        .olmaz { border-bottom: 5px solid var(--olmaz); }
        .detail-card { background: #fafafa; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-top: 15px; }
        .res-table { width: 100%; border-collapse: collapse; }
        .res-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .tag { font-weight: 700; color: var(--gold); width: 120px; }
        .status-pill { padding: 3px 8px; border-radius: 5px; color: white; font-size: 11px; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-go { background: var(--gold); color: white; border: none; font-weight: 700; cursor: pointer; }
        .wa-link { background: #25d366; color: white; text-decoration: none; display: block; text-align: center; padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: 700; }
    </style>
</head>
<body>

<div class="container" id="inputSection">
    <h2 style="text-align:center; color:var(--gold);">KBA MODÜLER SİSTEM</h2>
    <input type="text" id="name" placeholder="Ad Soyad">
    <input type="number" id="ebced" placeholder="Ebced Değeri">
    <input type="date" id="bdate">
    <button class="btn-go" onclick="analizEt()">ANALİZİ BAŞLAT</button>
</div>

<div class="container" id="outputSection" style="display:none;">
    <div id="printArea">
        <h2 id="displayName" style="margin-bottom:5px;"></h2>
        <div id="displayKod" style="text-align:center; font-weight:700; color:var(--gold); margin-bottom:10px;"></div>
        <div class="grid" id="mainGrid"></div>
        <div id="detailBox"></div>
    </div>
    <button onclick="save()" style="background:#34495e; color:white; border:none; padding:12px; width:100%; border-radius:10px; cursor:pointer; font-weight:600; margin-top:10px;">📷 SONUÇLARI KAYDET</button>
    <div id="waBtnArea"></div>
    <button onclick="location.reload()" style="background:#eee; border:none; padding:10px; width:100%; border-radius:10px; margin-top:10px; cursor:pointer;">🔄 YENİ ANALİZ</button>
</div>

<script>
const dataSet = [
    { n: "Şahsiyet", g: "Mars", celal: "Ya Malik", cemal: "Ya Kuddüs" },
    { n: "Kazanç", g: "Venüs", celal: "Ya Kafi", cemal: "Ya Gani" },
    { n: "Çevre", g: "Merkür", celal: "Ya Ali", cemal: "Ya Azim" },
    { n: "Yuva", g: "Ay", celal: "Ya Rahman", cemal: "Ya Rahim" },
    { n: "Aşk/Neşe", g: "Güneş", celal: "Ya Hay", cemal: "Ya Kayyum" },
    { n: "Sağlık", g: "Merkür", celal: "Ya Ali", cemal: "Ya Azim" },
    { n: "Eş/Ortak", g: "Venüs", celal: "Ya Kafi", cemal: "Ya Gani" },
    { n: "Dönüşüm", g: "Mars", celal: "Ya Malik", cemal: "Ya Kuddüs" },
    { n: "Ufuklar", g: "Jüpiter", celal: "Ya Kebir", cemal: "Ya Müteal" },
    { n: "Kariyer", g: "Satürn", celal: "Ya Fettah", cemal: "Ya Rezzak" },
    { n: "Dostlar", g: "Satürn", celal: "Ya Fettah", cemal: "Ya Rezzak" },
    { n: "Ruhsallık", g: "Jüpiter", celal: "Ya Kebir", cemal: "Ya Müteal" }
];

const azamMap = { 1:["Venüs","Güneş"], 2:["Ay"], 3:["Merkür","Jüpiter","Venüs","Satürn","Güneş"], 4:["Ay"], 5:["Jüpiter"], 6:["Ay"], 7:["Jüpiter"], 8:["Venüs"], 9:["Mars"] };

let finalResults = [];
let globalKod = 0;

function analizEt() {
    const ebced = document.getElementById('ebced').value;
    const bdate = document.getElementById('bdate').value;
    if(!ebced || !bdate) return;

    globalKod = (parseInt(ebced) % 9) || 9;
    const [y, m, d] = bdate.split('-').map(Number);
    
    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('outputSection').style.display = 'block';
    document.getElementById('displayName').innerText = document.getElementById('name').value.toUpperCase();
    document.getElementById('displayKod').innerText = "KADER KODU: " + globalKod;

    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";
    finalResults = [];

    for(let i=0; i<12; i++) {
        // 1. MODÜL: HİCRİ GÜN VE EVRE HESABI
        let targetDate = new Date(y, (m-1) + i, d, 12, 0, 0);
        let hDay = parseInt(new Intl.DateTimeFormat('tr-TN-u-ca-islamic-uma-nu-latn', {day:'numeric', calendar:'islamic-uma'}).format(targetDate));
        
        let ev = dataSet[i];
        let evre = "";
        if (ev.g === "Satürn") evre = (hDay <= 15) ? "OLUR" : "OLMAZ";
        else if (hDay <= 10) evre = (ev.g === "Merkür") ? "OLMAZ" : "OLUR";
        else if (hDay <= 20) evre = (ev.g === "Ay" || ev.g === "Mars") ? "OLMAZ" : "SIKINTILI";
        else evre = (ev.g === "Merkür") ? "OLUR" : (ev.g === "Ay" || ev.g === "Mars") ? "SIKINTILI" : "OLMAZ";

        // 2. MODÜL: ESMA VE KOD ETKİLEŞİMİ (ITİDAL/TEFRİT)
        let fıtrat = "İTİDAL";
        if(globalKod == 2 && (ev.g === "Jüpiter" || ev.g === "Ay")) fıtrat = "TEFRİT (İçsel Cemal Etki)";
        if(globalKod == 7 && ev.g === "Satürn") fıtrat = "İFRAT (Zorlanma/Baskı)";

        let isAzam = azamMap[globalKod]?.includes(ev.g);
        finalResults.push({ ...ev, hDay, evre, fıtrat, isAzam, evNo: i+1 });

        let cls = isAzam ? "mühür" : evre.toLowerCase().replace('ı','i');
        grid.innerHTML += `<div class="box ${cls}" onclick="detayGor(${i})">${i+1}. EV<br><small>${isAzam?'MÜHÜR':evre}</small></div>`;
    }
    detayGor(0);
}

function detayGor(i) {
    const r = finalResults[i];
    document.getElementById('detailBox').innerHTML = `
        <div class="detail-card">
            <h3 style="margin-top:0; color:var(--gold); border-bottom:1px solid #ddd;">${r.evNo}. Ev: ${r.n} (${r.g})</h3>
            <table class="res-table">
                <tr><td class="tag">Arabi Gün</td><td>${r.hDay}</td></tr>
                <tr><td class="tag">Evre Durumu</td><td><strong>${r.evre}</strong></td></tr>
                <tr><td class="tag">Esma Terkibi</td><td>${r.celal} / ${r.cemal}</td></tr>
                <tr><td class="tag">Fıtrat Analizi</td><td>${r.isAzam ? 'İsmi Azam Mührü Aktif' : r.fıtrat}</td></tr>
                <tr><td class="tag">Sentez Notu</td><td style="font-style:italic; font-size:12px; color:#555;">
                    ${r.isAzam ? 'Mühürlü alan; tam irade kullanımı gerekir.' : (r.evre === 'OLUR' && r.fıtrat.includes('TEFRİT') ? 'Yol açık ancak içsel bir duraksama (tefrit) nedeniyle adım atmakta zorlanabilir.' : 'Süreci evre ve fıtrat dengesi belirler.')}
                </td></tr>
            </table>
        </div>`;
    
    const waMsg = encodeURIComponent(`KBA Analizi\n${r.evNo}. Ev (${r.n})\nEvre: ${r.evre}\nFıtrat: ${r.fıtrat}`);
    document.getElementById('waBtnArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-link">💬 SÜLEYMAN BEY'E SOR</a>`;
}

function save() {
    html2canvas(document.getElementById('printArea')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'KBA-Analiz.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>
</body>
</html>
