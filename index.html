<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Bütünsel Tekamül Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b8860b; --bg: #f4f7f6; --card: #ffffff;
            --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --azam: #8e44ad;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #2d3436; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 800px; background: var(--card); margin: 20px auto; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 50px; font-weight: 800; color: var(--gold); letter-spacing: 10px; line-height: 1; }
        .kba-sub { font-size: 11px; color: #95a5a6; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; margin-top: 5px; }

        .screen { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        input { width: 90%; padding: 15px; border: 2px solid #f0f0f0; border-radius: 15px; font-size: 16px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; background: #fff; }

        .btn { background: var(--gold); color: white; border: none; padding: 18px; border-radius: 15px; cursor: pointer; font-weight: 700; width: 90%; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background: #966d09; transform: translateY(-2px); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; margin-top: 30px; }
        .house-node { background: #fff; border: 1px solid #f0f0f0; padding: 20px 10px; border-radius: 18px; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); background: #fffdf9; }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); background: #fff9f9; }
        .node-azam { border-bottom: 6px solid var(--azam); background: #fdfaff; font-weight: bold; transform: scale(1.03); box-shadow: 0 5px 15px rgba(142,68,173,0.1); }

        /* TOOLTIP STYLE */
        .tooltip-trigger { display: inline-block; width: 16px; height: 16px; background: #dfe6e9; color: #636e72; border-radius: 50%; font-size: 11px; line-height: 16px; text-align: center; margin-left: 5px; cursor: help; font-weight: bold; }
        
        .detail-view { background: #fff; border: 2px solid var(--gold); padding: 25px; margin-top: 25px; border-radius: 20px; text-align: left; position: relative; }
        .badge { padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 11px; color: white; position: absolute; top: -12px; right: 20px; }
        
        .analysis-box { background: #f9fbfa; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); margin-top: 15px; font-size: 14px; line-height: 1.6; }

        .wa-box { background: #25d366; color: white; padding: 18px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-top: 30px; transition: 0.3s; }
        
        footer { margin-top: 40px; font-size: 11px; color: #bdc3c7; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-area">
        <div class="logo">KBA</div>
        <div class="kba-sub">Fıtrat ve Kader Rehberi</div>
    </div>

    <div id="sc1" class="screen active">
        <div class="input-group">
            <input type="text" id="uName" placeholder="Ad Soyad">
            <input type="number" id="uEbced" placeholder="İsim Ebced Değeri">
            <input type="date" id="uBirth">
        </div>
        <button class="btn" onclick="runKBA()">ANALİZİ MÜHÜRLE</button>
    </div>

    <div id="sc2" class="screen">
        <div id="header-info" style="text-align:center; margin-bottom:20px;">
            <h2 id="welcome" style="margin:0; color:var(--gold);"></h2>
            <div id="kodBadge" style="font-weight:700; font-size:14px; color:#7f8c8d;"></div>
        </div>
        
        <div class="grid-container" id="nodes"></div>
        <div id="details"></div>

        <a href="https://wa.me/905XXXXXXXXX" target="_blank" class="wa-box">DANIŞMANLIK İÇİN WHATSAPP</a>
        <button class="btn" onclick="location.reload()" style="background:#bdc3c7; font-size:14px; margin-top:15px;">YENİ ANALİZ</button>
    </div>

    <footer>© 2026 KB - KBA TEKAMÜL SİSTEMLERİ</footer>
</div>

<script>
    // Tooltip Sözlüğü
    const tipMap = {
        mizac: "Ebced kodunuza göre ruhsal enerjinizin dışa (Celal), içe (Cemal) veya dengeye (İtidal) yönelme halidir.",
        hicri: "Ay'ın döngüsünü esas alan Arabi takvim günüdür. Gezegen etkilerinin fıtratla uyumunu belirler.",
        azam: "Kişinin ismine özel mühürlenen, zorlukları rahmete dönüştüren en güçlü tekamül kapısıdır."
    };

    const planetPool = [
        { g: "Mars", t: "Şahsiyet", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Rızık", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Merkür", t: "İletişim", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Ay", t: "Aile", esma: "Ya Rahman Ya Rahim", evre: "AyMars" },
        { g: "Güneş", t: "Neşe", esma: "Ya Hay Ya Kayyum", evre: "VGJ" },
        { g: "Merkür", t: "Hizmet", esma: "Ya Ali Ya Azim", evre: "Mer" },
        { g: "Mars", t: "Ortaklık", esma: "Ya Malik Ya Kuddüs", evre: "AyMars" },
        { g: "Venüs", t: "Dönüşüm", esma: "Ya Kafi Ya Gani", evre: "VGJ" },
        { g: "Jüpiter", t: "Vizyon", esma: "Ya Kebir Ya Müteal", evre: "VGJ" },
        { g: "Satürn", t: "Kariyer", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Satürn", t: "Sosyal", esma: "Ya Fettah Ya Rezzak", evre: "Sat" },
        { g: "Jüpiter", t: "Bilinç", esma: "Ya Kebir Ya Müteal", evre: "VGJ" }
    ];

    function getHicriDay(date) {
        let d = date.getDate(), m = date.getMonth() + 1, y = date.getFullYear();
        let jd = Math.floor((1461*(y+4800+Math.floor((m-14)/12)))/4)+Math.floor((367*(m-2-12*(Math.floor((m-14)/12))))/12)-Math.floor((3*(Math.floor((y+4900+Math.floor((m-14)/12))/100)))/4)+d-32075;
        let l = jd-1948440+10632, n = Math.floor((l-1)/10631); l = l-10631*n+354;
        let j = (Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));
        l = l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;
        let dh = l-Math.floor((709*Math.floor((24*l)/709))/24);
        return (dh+1) > 30 ? 1 : (dh+1);
    }

    function getZodiac(date) {
        const m = date.getMonth()+1, d = date.getDate();
        if ((m==3 && d>=21)||(m==4 && d<=19)) return 0; if ((m==4 && d>=20)||(m==5 && d<=20)) return 1;
        if ((m==5 && d>=21)||(m==6 && d<=20)) return 2; if ((m==6 && d>=21)||(m==7 && d<=22)) return 3;
        if ((m==7 && d>=23)||(m==8 && d<=22)) return 4; if ((m==8 && d>=23)||(m==9 && d<=22)) return 5;
        if ((m==9 && d>=23)||(m==10 && d<=22)) return 6; if ((m==10 && d>=23)||(m==11 && d<=21)) return 7;
        if ((m==11 && d>=22)||(m==12 && d<=21)) return 8; if ((m==12 && d>=22)||(m==1 && d<=19)) return 9;
        if ((m==1 && d>=20)||(m==2 && d<=18)) return 10; return 11;
    }

    function getAzamPlanets(kod) {
        if(kod===1) return ["Venüs", "Güneş"]; if([2,4,6].includes(kod)) return ["Ay"];
        if(kod===3) return ["Satürn", "Güneş", "Merkür", "Jüpiter", "Venüs"];
        if([5,7].includes(kod)) return ["Jüpiter"]; if(kod===8) return ["Venüs"];
        if(kod===9) return ["Mars"]; return [];
    }

    let results = []; let currentKod = 0;

    function runKBA() {
        const name = document.getElementById('uName').value, ebced = document.getElementById('uEbced').value, birth = document.getElementById('uBirth').value;
        if(!name || !ebced || !birth) return;
        currentKod = (parseInt(ebced) % 9) || 9;
        const zIdx = getZodiac(new Date(birth)), azamPlanets = getAzamPlanets(currentKod);
        const nodes = document.getElementById('nodes');
        nodes.innerHTML = ""; results = [];

        for(let i=0; i<12; i++) {
            let h = planetPool[(i + zIdx) % 12];
            let evDate = new Date(); evDate.setMonth(evDate.getMonth() + i);
            let hDay = getHicriDay(evDate);
            let status = "";
            if (h.evre === "AyMars") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTILI");
            else if (h.evre === "Mer") status = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTILI" : "OLUR");
            else if (h.evre === "VGJ") status = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTILI" : "OLMAZ");
            else status = hDay <= 15 ? "GERÇEKLEŞİR" : "GERÇEKLEŞMEZ";

            let isAzam = azamPlanets.includes(h.g); if (isAzam) status = "İSMİ AZAM";
            results.push({...h, status, hDay, isAzam, evNo: i+1});
            let cls = isAzam ? "node-azam" : (status.includes("OLUR") || status.includes("GERÇEK") ? "node-olur" : (status === "SIKINTILI" ? "node-sikinti" : "node-olmaz"));
            nodes.innerHTML += `<div class="house-node ${cls}" onclick="view(${i})">${i+1}. EV<br><small>${isAzam ? '✨ MÜHÜR' : h.t}</small></div>`;
        }
        document.getElementById('welcome').innerText = name.toUpperCase();
        document.getElementById('kodBadge').innerText = "KODUNUZ: " + currentKod;
        document.getElementById('sc1').classList.remove('active');
        document.getElementById('sc2').classList.add('active');
        view(0);
    }

    function view(i) {
        const d = results[i];
        let mizac = ([1,3,9].includes(currentKod)) ? "Celal" : ([2,4,6].includes(currentKod) ? "Cemal" : "İtidal");
        let color = d.isAzam ? "var(--azam)" : (d.status.includes("OLUR") ? "var(--olur)" : (d.status === "SIKINTILI" ? "var(--sikinti)" : "var(--olmaz)"));

        document.getElementById('details').innerHTML = `
            <div class="detail-view">
                <span class="badge" style="background:${color}">${d.status}</span>
                <h3 style="margin:0; color:var(--gold);">${d.evNo}. Ev: ${d.t} (${d.g})</h3>
                <div class="analysis-box">
                    <strong>Mizaç:</strong> ${mizac} <span class="tooltip-trigger" title="${tipMap.mizac}">?</span><br>
                    <strong>Arabi Gün:</strong> ${d.hDay} <span class="tooltip-trigger" title="${tipMap.hicri}">?</span><br>
                    <strong>Esma Terkibi:</strong> ${d.esma}<br>
                    <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
                    <strong>Analiz:</strong> ${d.isAzam ? `İSMİ AZAM <span class="tooltip-trigger" title="${tipMap.azam}">?</span> kapısı açıktır.` : 'Rutin tekamül döngüsü.'}
                </div>
            </div>`;
    }
</script>
</body>
</html>
