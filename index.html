<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Tam Donanımlı Sistem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b8860b; --azam: #8e44ad; --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --wa: #25d366; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 850px; background: #fff; margin: 10px auto; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h1, h2 { text-align: center; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .house-box { background: #fff; border: 1px solid #f0f0f0; padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .node-azam { background: linear-gradient(135deg, #fdfaff 0%, #f3e5f5 100%) !important; border: 3px solid var(--azam) !important; transform: scale(1.03); }
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); }
        .analysis-detail { background: #fff; border: 2px solid var(--gold); padding: 20px; border-radius: 25px; margin-top: 20px; }
        .desc-box { background: #fdfcf9; padding: 15px; border-radius: 15px; border-left: 5px solid var(--gold); margin-top: 15px; line-height: 1.6; font-size: 14px; }
        input { width: 85%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; text-align: center; font-size: 16px; background: #fafafa; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 90%; }
        .wa-btn { background: var(--wa); color: white; padding: 15px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-top: 15px; gap: 10px; }
        .save-btn { background: #2c3e50; color: white; width: 100%; margin-top: 20px; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .new-btn { background: #eee; width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; color: #555; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen1" style="text-align: center;">
        <h1>KBA SİSTEMİ</h1>
        <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 20px;">"Rakamlar yalan söylemez, fıtrat asla şaşmaz."</p>
        <input type="text" id="nameIn" placeholder="Danışan Ad Soyad">
        <input type="number" id="ebcedIn" placeholder="Ebced Değeri">
        <input type="date" id="birthIn">
        <button class="btn-main" onclick="runKBA()">ANALİZİ BAŞLAT</button>
    </div>

    <div id="screen2" style="display:none;">
        <div id="captureArea" style="padding:15px; background:#fff; border-radius:20px;">
            <h2 id="outName" style="margin-bottom:5px;"></h2>
            <div id="outKod" style="font-weight:800; color:var(--gold); text-align:center; font-size:18px;"></div>
            <p id="outBurc" style="text-align:center; font-size:14px; color:#7f8c8d; margin:5px 0;"></p>
            <div class="grid" id="gridHouses"></div>
            <div id="detailView"></div>
        </div>
        
        <div id="waBtnArea"></div>
        
        <button class="save-btn" onclick="saveImage()">📷 ANALİZ KARTINI KAYDET (RESİM)</button>
        
        <button class="new-btn" onclick="location.reload()">🔄 YENİ ANALİZ BAŞLAT</button>
    </div>
</div>

<script>
    const evData = [
        { t: "Şahsiyet", g: "Mars" }, { t: "Rızık", g: "Venüs" }, { t: "İletişim", g: "Merkür" },
        { t: "Aile/Ev", g: "Ay" }, { t: "Neşe/Aşk", g: "Güneş" }, { t: "Sağlık", g: "Merkür" },
        { t: "Ortaklık", g: "Venüs" }, { t: "Dönüşüm", g: "Mars" }, { t: "Vizyon", g: "Jüpiter" },
        { t: "Kariyer", g: "Satürn" }, { t: "Sosyal", g: "Satürn" }, { t: "Bilinçaltı", g: "Jüpiter" }
    ];

    const azamRules = {
        1: ["Venüs", "Güneü"], 2: ["Ay"], 4: ["Ay"], 6: ["Ay"],
        3: ["Merkür", "Jüpiter", "Venüs", "Satürn", "Güneş"],
        5: ["Jüpiter"], 7: ["Jüpiter"], 8: ["Venüs"], 9: ["Mars"]
    };

    const esmalar = { "Mars": "Ya Malik Ya Kuddüs", "Venüs": "Ya Kafi Ya Gani", "Merkür": "Ya Ali Ya Azim", "Ay": "Ya Rahman Ya Rahim", "Güneş": "Ya Hay Ya Kayyum", "Jüpiter": "Ya Kebir Ya Müteal", "Satürn": "Ya Fettah Ya Rezzak" };

    function getBurc(d, m) {
        const days = [19, 18, 20, 19, 20, 20, 22, 22, 22, 22, 21, 21];
        const names = ["Oğlak", "Kova", "Balık", "Koç", "Boğa", "İkizler", "Yengeç", "Aslan", "Başak", "Terazi", "Akrep", "Yay"];
        return d > days[m - 1] ? names[m % 12] : names[m - 1];
    }

    function getHijriDay(baseDate, offset) {
        let d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, baseDate.getDate());
        let formatter = new Intl.DateTimeFormat('tr-TN-u-ca-islamic-uma-nu-latn', {day: 'numeric'});
        return parseInt(formatter.format(d));
    }

    let report = [];
    let currentName = "";

    function runKBA() {
        const name = document.getElementById('nameIn').value;
        const ebced = document.getElementById('ebcedIn').value;
        const birth = document.getElementById('birthIn').value;
        if(!name || !ebced || !birth) return;

        currentName = name.toUpperCase();
        let kod = (parseInt(ebced) % 9) || 9;
        const baseDate = new Date(birth);
        const burc = getBurc(baseDate.getDate(), baseDate.getMonth() + 1);

        document.getElementById('screen1').style.display = 'none';
        document.getElementById('screen2').style.display = 'block';
        document.getElementById('outName').innerText = currentName;
        document.getElementById('outKod').innerText = "KADER KODU: " + kod;
        document.getElementById('outBurc').innerText = burc + " Burcu";

        const grid = document.getElementById('gridHouses');
        grid.innerHTML = "";
        report = [];

        for(let i=0; i<12; i++) {
            const ev = evData[i];
            let hDay = getHijriDay(baseDate, i);
            let nite = "";

            if (hDay >= 1 && hDay <= 10) nite = (ev.g === "Merkür") ? "OLMAZ" : "OLUR";
            else if (hDay >= 11 && hDay <= 20) nite = (ev.g === "Ay" || ev.g === "Mars") ? "OLMAZ" : "SIKINTILI";
            else { 
                if (ev.g === "Merkür") nite = "OLUR";
                else if (ev.g === "Ay" || ev.g === "Mars") nite = "SIKINTILI";
                else nite = "OLMAZ";
            }
            if (ev.g === "Satürn") nite = (hDay <= 15) ? "OLUR" : "OLMAZ";

            let isAzam = azamRules[kod] && azamRules[kod].includes(ev.g);
            report.push({...ev, nite, isAzam, evNo: i+1, hDay: hDay});

            let cls = isAzam ? "node-azam" : ("node-" + nite.toLowerCase().replace("ı","i"));
            grid.innerHTML += `<div class="house-box ${cls}" onclick="showDetail(${i})">
                <b>${i+1}. EV</b><br><small>${isAzam ? '✨ MÜHÜR' : nite}</small><br>
                <span style="font-size:9px; color:#777;">Hicri: ${hDay}</span>
            </div>`;
        }
        showDetail(0);
    }

    function showDetail(i) {
        const d = report[i];
        document.getElementById('detailView').innerHTML = `
            <div class="analysis-detail">
                <h4 style="margin:0; color:var(--gold);">${d.evNo}. Ev: ${d.t} (${d.g})</h4>
                <div class="desc-box">
                    <strong>Esma:</strong> ${esmalar[d.g]}<br><br>
                    ${d.isAzam ? '<b>✨ MÜHÜR:</b> İradeniz gökyüzünden üstündür.' : '<b>'+d.nite+' VAKTİ:</b> Arabi günün tesiri.'}<br>
                    <small style="color:#7f8c8d;">Hicri ${d.hDay}. gün döngüsü.</small>
                </div>
            </div>`;

        // WhatsApp Mesajı Hazırlama
        const waText = encodeURIComponent(`Selam KBA, KBA Analizim hakkında danışmak istiyorum. \n\nİsim: ${currentName}\nEv: ${d.evNo}. Ev (${d.t})\nDurum: ${d.isAzam ? 'MÜHÜR' : d.nite}\nArabi Gün: ${d.hDay}`);
        document.getElementById('waBtnArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waText}" target="_blank" class="wa-btn">💬 WHATSAPP DANIŞMA HATTI</a>`;
    }

    function saveImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = `${currentName}-KBA-Analiz.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
