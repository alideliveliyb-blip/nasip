<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Süleyman Danışmanlık</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b8860b; --azam: #8e44ad; --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; }
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 850px; background: #fff; margin: 10px auto; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h1, h2 { text-align: center; color: var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-top: 20px; }
        .house-box { background: #fff; border: 1px solid #eee; padding: 12px 5px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 13px; font-weight: 700; }
        .node-azam { border: 3px solid var(--azam) !important; background: #fdfaff; }
        .node-olur { border-bottom: 5px solid var(--olur); }
        .node-sikinti { border-bottom: 5px solid var(--sikinti); }
        .node-olmaz { border-bottom: 5px solid var(--olmaz); }
        .analysis-detail { background: #fff; border: 2px solid var(--gold); padding: 20px; border-radius: 20px; margin-top: 20px; }
        .balance-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .balance-table td { padding: 10px; border-bottom: 1px solid #eee; }
        .label { font-weight: 700; color: var(--gold); width: 100px; }
        input, .btn-calc { width: 90%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; text-align: center; }
        .btn-calc { background: var(--gold); color: white; border: none; font-weight: 700; cursor: pointer; }
        .wa-btn { background: #25d366; color: white; padding: 15px; border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-top: 15px; gap: 10px; }
        .save-btn { background: #2c3e50; color: white; width: 100%; margin-top: 15px; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container" id="screen1">
    <h1>KBA SİSTEMİ</h1>
    <p style="text-align:center; color:#7f8c8d; font-size:13px;">"Gezegenlerin dilini, esmaların nuruyla oku."</p>
    <center>
        <input type="text" id="nameIn" placeholder="Danışan Ad Soyad">
        <input type="number" id="ebcedIn" placeholder="Ebced Değeri">
        <input type="date" id="birthIn">
        <button class="btn-calc" onclick="runKBA()">ANALİZİ BAŞLAT</button>
    </center>
</div>

<div class="app-container" id="screen2" style="display:none;">
    <div id="captureArea" style="padding:10px;">
        <h2 id="outName" style="margin-bottom:5px;"></h2>
        <div id="outInfo" style="text-align:center; font-weight:800; color:var(--gold); font-size:18px;"></div>
        <div class="grid" id="gridHouses"></div>
        <div id="detailView"></div>
    </div>
    
    <div id="waArea"></div>
    <button class="save-btn" onclick="saveImage()">📷 ANALİZ KARTINI KAYDET</button>
    <button onclick="location.reload()" style="width:100%; margin-top:10px; padding:12px; border:none; border-radius:12px; background:#eee; cursor:pointer;">YENİ ANALİZ</button>
</div>

<script>
    const evData = [
        { t: "Şahsiyet", g: "Mars", celal: "Ya Malik", cemal: "Ya Kuddüs" },
        { t: "Kazanç", g: "Venüs", celal: "Ya Kafi", cemal: "Ya Gani" },
        { t: "Çevre", g: "Merkür", celal: "Ya Ali", cemal: "Ya Azim" },
        { t: "Yuva", g: "Ay", celal: "Ya Rahman", cemal: "Ya Rahim" },
        { t: "Aşk/Çocuk", g: "Güneş", celal: "Ya Hay", cemal: "Ya Kayyum" },
        { t: "Sağlık", g: "Merkür", celal: "Ya Ali", cemal: "Ya Azim" },
        { t: "Eş/Ortak", g: "Venüs", celal: "Ya Kafi", cemal: "Ya Gani" },
        { t: "Dönüşüm", g: "Mars", celal: "Ya Malik", cemal: "Ya Kuddüs" },
        { t: "Ufuklar", g: "Jüpiter", celal: "Ya Kebir", cemal: "Ya Müteal" },
        { t: "Kariyer", g: "Satürn", celal: "Ya Fettah", cemal: "Ya Rezzak" },
        { t: "Dostlar", g: "Satürn", celal: "Ya Fettah", cemal: "Ya Rezzak" },
        { t: "Ruhsallık", g: "Jüpiter", celal: "Ya Kebir", cemal: "Ya Müteal" }
    ];

    const azamRules = {
        1: ["Venüs", "Güneş"], 2: ["Ay"], 3: ["Merkür", "Jüpiter", "Venüs", "Satürn", "Güneş"],
        4: ["Ay"], 5: ["Jüpiter"], 6: ["Ay"], 7: ["Jüpiter"], 8: ["Venüs"], 9: ["Mars"]
    };

    function getHijriDay(baseDate, offset) {
        let d = new Date(baseDate.getFullYear(), baseDate.getMonth() + offset, baseDate.getDate());
        return parseInt(new Intl.DateTimeFormat('tr-TN-u-ca-islamic-uma-nu-latn', {day: 'numeric'}).format(d));
    }

    let report = [];
    let userKod = 0;
    let dName = "";

    function runKBA() {
        const name = document.getElementById('nameIn').value;
        const ebced = document.getElementById('ebcedIn').value;
        const birth = document.getElementById('birthIn').value;
        if(!name || !ebced || !birth) return;

        dName = name.toUpperCase();
        userKod = (parseInt(ebced) % 9) || 9;
        const baseDate = new Date(birth);

        document.getElementById('screen1').style.display = 'none';
        document.getElementById('screen2').style.display = 'block';
        document.getElementById('outName').innerText = dName;
        document.getElementById('outInfo').innerText = "KADER KODU: " + userKod;

        const grid = document.getElementById('gridHouses');
        grid.innerHTML = "";
        report = [];

        for(let i=0; i<12; i++) {
            let ev = evData[i];
            let hDay = getHijriDay(baseDate, i);
            let nite = "";

            if (hDay >= 1 && hDay <= 10) nite = (ev.g === "Merkür") ? "OLMAZ" : "OLUR";
            else if (hDay >= 11 && hDay <= 20) nite = (ev.g === "Ay" || ev.g === "Mars") ? "OLMAZ" : "SIKINTILI";
            else { 
                if (ev.g === "Merkür") nite = "OLUR";
                else if (ev.g === "Ay" || ev.g === "Mars") nite = "SIKINTILI";
                else nite = "OLMAZ";
            }
            if (ev.g === "Satürn") nite = (hDay <= 15) ? "OLUR" : "OLMAZ";

            let isAzam = azamRules[userKod] && azamRules[userKod].includes(ev.g);
            report.push({...ev, nite, isAzam, hDay, evNo: i+1});

            let cls = isAzam ? "node-azam" : ("node-" + nite.toLowerCase().replace("ı","i"));
            grid.innerHTML += `<div class="house-box ${cls}" onclick="showDetail(${i})">
                ${i+1}. EV<br><small>${isAzam ? 'MÜHÜR' : nite}</small><br>
                <span style="font-size:9px; font-weight:400;">H.Gün: ${hDay}</span>
            </div>`;
        }
        showDetail(0);
    }

    function showDetail(i) {
        const d = report[i];
        let itidalYorum = "";
        
        if(userKod == 2 && d.g === "Jüpiter") {
            itidalYorum = "İçsellikte Cemal etki ağır basar, tefritte kalma riski vardır. Evre "+d.nite+" olduğu için süreç buna göre şekillenir.";
        } else {
            itidalYorum = d.isAzam ? "Mühürlü Alan: İrade ve itidal tamdır." : "Celal ve Cemal dengesi mevcuttur.";
        }

        document.getElementById('detailView').innerHTML = `
            <div class="analysis-detail">
                <h3 style="margin:0; color:var(--gold);">${d.evNo}. Ev: ${d.t}</h3>
                <table class="balance-table">
                    <tr><td class="label">Celal</td><td>${d.celal}</td></tr>
                    <tr><td class="label">Cemal</td><td>${d.cemal}</td></tr>
                    <tr><td class="label">Evre</td><td><strong>${d.nite}</strong></td></tr>
                    <tr><td class="label">Analiz</td><td>${itidalYorum}</td></tr>
                </table>
            </div>`;
        
        const waMsg = encodeURIComponent(`Selam Süleyman Bey, KBA analizim hakkında danışmak istiyorum.\n\nİsim: ${dName}\nEv: ${d.evNo} (${d.t})\nArabi Gün: ${d.hDay}\nEvre: ${d.nite}`);
        document.getElementById('waArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-btn">💬 SÜLEYMAN BEY'E DANIŞ</a>`;
    }

    function saveImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            const link = document.createElement('a');
            link.download = `${dName}-KBA.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
