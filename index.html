<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Profesyonel Analiz Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #b8860b; --azam: #8e44ad; --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #2d3436; }
        .app-container { width: 100%; max-width: 800px; background: #fff; margin: 15px auto; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .node-azam { 
            background: linear-gradient(135deg, #fdfaff 0%, #f3e5f5 100%) !important; 
            border: 3px solid var(--azam) !important;
            box-shadow: 0 8px 20px rgba(142, 68, 173, 0.25);
            transform: scale(1.03);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 20px; }
        .house-box { background: #fff; border: 1px solid #f0f0f0; padding: 15px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); }

        .header { text-align: center; padding: 20px; background: #fbfcfc; border-radius: 20px; border: 1px solid #eee; }
        .header h2 { color: var(--gold); margin: 0; text-transform: uppercase; }

        .analysis-card { background: #fff; border: 2px solid var(--gold); padding: 20px; border-radius: 25px; margin-top: 20px; position: relative; overflow: hidden; }
        .desc-box { background: #f9fbfa; padding: 15px; border-radius: 18px; border-left: 5px solid var(--gold); margin-top: 15px; line-height: 1.6; font-size: 14px; }
        
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; text-align: center; font-size: 16px; }
        .btn-main { background: var(--gold); color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 95%; }
        
        .wa-btn { background: #25d366; color: white; padding: 15px; border-radius: 15px; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-weight: 700; margin-top: 15px; }
        .screenshot-btn { background: #34495e; color: white; padding: 10px; border-radius: 10px; border: none; width: 100%; margin-top: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="loginScreen" style="text-align: center;">
        <h1 style="color:var(--gold)">KBA ANALİZ SİSTEMİ</h1>
        <input type="text" id="userName" placeholder="AD SOYAD">
        <input type="number" id="userEbced" placeholder="EBCED DEĞERİ">
        <input type="date" id="userBirth">
        <button class="btn-main" onclick="startKBA()">ANALİZİ BAŞLAT</button>
    </div>

    <div id="resultScreen" style="display:none;">
        <div id="captureArea" style="padding: 10px; background: #fff; border-radius: 20px;">
            <div class="header">
                <h2 id="outName"></h2>
                <div id="outMeta" style="font-size:13px; color:#7f8c8d; margin-top:5px;"></div>
                <div id="outKod" style="font-weight:800; color:var(--gold); margin-top:5px;"></div>
            </div>
            <div class="grid" id="gridNodes"></div>
            <div id="cardView"></div>
        </div>
        
        <div id="actionButtons">
            <button class="screenshot-btn" onclick="takeScreenshot()">📷 ANALİZ KARTINI KAYDET</button>
            <div id="waArea"></div>
            <button onclick="location.reload()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:12px; background:#eee; cursor:pointer;">YENİ ANALİZ</button>
        </div>
    </div>
</div>

<script>
    const evData = [
        { t: "Şahsiyet", g: "Mars" }, { t: "Rızık", g: "Venüs" }, { t: "İletişim", g: "Merkür" },
        { t: "Aile/Ev", g: "Ay" }, { t: "Neşe/Aşk", g: "Güneş" }, { t: "Hizmet/Sağlık", g: "Merkür" },
        { t: "Ortaklık", g: "Venüs" }, { t: "Dönüşüm", g: "Mars" }, { t: "Vizyon", g: "Jüpiter" },
        { t: "Kariyer", g: "Satürn" }, { t: "Sosyal", g: "Satürn" }, { t: "Bilinçaltı", g: "Jüpiter" }
    ];

    const esmalar = { "Mars": "Ya Malik Ya Kuddüs", "Venüs": "Ya Kafi Ya Gani", "Merkür": "Ya Ali Ya Azim", "Ay": "Ya Rahman Ya Rahim", "Güneş": "Ya Hay Ya Kayyum", "Jüpiter": "Ya Kebir Ya Müteal", "Satürn": "Ya Fettah Ya Rezzak" };

    const azamRules = {
        1: ["Venüs", "Güneş"], 2: ["Ay"], 4: ["Ay"], 6: ["Ay"],
        3: ["Merkür", "Jüpiter", "Venüs", "Satürn", "Güneş"],
        5: ["Jüpiter"], 7: ["Jüpiter"], 8: ["Venüs"], 9: ["Mars"]
    };

    let report = [];
    let kod = 0;
    let uBurc = "";

    function startKBA() {
        const name = document.getElementById('userName').value;
        const ebced = document.getElementById('userEbced').value;
        const birth = document.getElementById('userBirth').value;
        if(!name || !ebced || !birth) return alert("Eksik bilgi!");

        kod = (parseInt(ebced) % 9) || 9;
        const bDate = new Date(birth);
        const day = bDate.getDate();
        
        // Burç Bulma
        const m = bDate.getMonth() + 1, d = bDate.getDate();
        uBurc = (m==3&&d>=21)||(m==4&&d<=19)?"Koç":(m==4&&d>=20)||(m==5&&d<=20)?"Boğa":(m==5&&d>=21)||(m==6&&d<=20)?"İkizler":(m==6&&d>=21)||(m==7&&d<=22)?"Yengeç":(m==7&&d>=23)||(m==8&&d<=22)?"Aslan":(m==8&&d>=23)||(m==9&&d<=22)?"Başak":(m==9&&d>=23)||(m==10&&d<=22)?"Terazi":(m==10&&d>=23)||(m==11&&d<=21)?"Akrep":(m==11&&d>=22)||(m==12&&d<=21)?"Yay":(m==12&&d>=22)||(m==1&&d<=19)?"Oğlak":(m==1&&d>=20)||(m==2&&d<=18)?"Kova":"Balık";

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('outName').innerText = name.toUpperCase();
        document.getElementById('outMeta').innerText = `${birth.split("-").reverse().join(".")} | ${uBurc} Burcu`;
        document.getElementById('outKod').innerText = "KBA KADER KODU: " + kod;

        const grid = document.getElementById('gridNodes');
        grid.innerHTML = "";
        report = [];

        for(let i=0; i<12; i++) {
            const ev = evData[i];
            let nite = ((day + i) % 3 === 0) ? "OLUR" : (((day + i) % 3 === 1) ? "SIKINTILI" : "OLMAZ");
            let isAzam = azamRules[kod] && azamRules[kod].includes(ev.g);

            report.push({...ev, nite, isAzam, evNo: i+1});
            let cls = isAzam ? "node-azam" : ("node-" + nite.toLowerCase().replace("ı","i"));
            grid.innerHTML += `<div class="house-box ${cls}" onclick="show(
                ${i})"><b>${i+1}. EV</b><br><small>${isAzam ? '✨ MÜHÜR' : nite}</small></div>`;
        }
        show(0);
    }

    function show(i) {
        const d = report[i];
        const mizac = ([1,3,9].includes(kod)) ? "CELAL" : "CEMAL";
        let metin = d.isAzam ? `<b>✨ İSMİ AZAM (İrade):</b> Bu evde iraden tamdır. Gezegenin (${d.g}) dengededir.` : 
                   `<b>${d.nite} EVRESİ:</b> ${d.t} alanında ${mizac === 'CELAL' ? 'İfrat (hız)' : 'Tefrit (yavaşlık)'} sınavı var.`;

        document.getElementById('cardView').innerHTML = `
            <div class="analysis-card">
                <h4 style="margin:0; color:var(--gold);">${d.evNo}. Ev: ${d.t} Analysis</h4>
                <div class="desc-box">
                    <strong>Esma:</strong> ${esmalar[d.g]}<br>
                    ${metin}
                </div>
            </div>`;

        const waMsg = encodeURIComponent(`Merhaba Süleyman Bey, ${uBurc} burcu olarak ${d.evNo}. evdeki ${d.isAzam ? 'İsmi Azam' : d.nite} durumum ve ${kod} kodum için danışmanlık almak istiyorum.`);
        document.getElementById('waArea').innerHTML = `<a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-btn">💬 BU EVRE İÇİN ÖZEL REÇETE AL</a>`;
    }

    function takeScreenshot() {
        const area = document.getElementById('captureArea');
        html2canvas(area).then(canvas => {
            const link = document.createElement('a');
            link.download = `KBA-Analiz-${document.getElementById('outName').innerText}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
