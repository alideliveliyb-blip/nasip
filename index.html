<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Fıtrat ve Kader Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b8860b; --bg: #f4f7f6; --card: #ffffff;
            --olur: #27ae60; --sikinti: #e67e22; --olmaz: #c0392b; --azam: #8e44ad;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #2d3436; margin: 0; padding: 10px; }
        .app-container { width: 100%; max-width: 800px; background: var(--card); margin: 20px auto; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        
        /* Tooltip Geliştirme */
        [data-tip] { position: relative; cursor: help; }
        [data-tip]:before {
            content: attr(data-tip);
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            padding: 15px; width: 250px; background: #2d3436; color: #fff;
            border-radius: 12px; font-size: 13px; font-weight: 400; line-height: 1.5;
            text-align: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        [data-tip]:hover:before { visibility: visible; opacity: 1; }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 50px; font-weight: 800; color: var(--gold); letter-spacing: 10px; line-height: 1; }
        .kba-sub { font-size: 11px; color: #95a5a6; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; margin-top: 5px; }

        .screen { display: none; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 12px; margin-top: 30px; }
        .house-node { background: #fff; border: 1px solid #f0f0f0; padding: 20px 10px; border-radius: 18px; cursor: pointer; text-align: center; transition: 0.3s; position: relative; }
        
        .node-olur { border-bottom: 6px solid var(--olur); }
        .node-sikinti { border-bottom: 6px solid var(--sikinti); }
        .node-olmaz { border-bottom: 6px solid var(--olmaz); }
        .node-azam { border-bottom: 6px solid var(--azam); background: #fdfaff; font-weight: bold; transform: scale(1.03); }

        .detail-view { background: #fff; border: 2px solid var(--gold); padding: 25px; margin-top: 25px; border-radius: 20px; text-align: left; }
        .badge { padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 12px; color: white; display: inline-block; margin-bottom: 10px; }
        
        .analysis-box { background: #f9fbfa; padding: 20px; border-radius: 15px; border-left: 5px solid var(--gold); line-height: 1.6; }
        .wa-box { background: #25d366; color: white; padding: 20px; border-radius: 15px; text-decoration: none; display: flex; flex-direction: column; align-items: center; text-align: center; font-weight: 600; margin-top: 25px; gap: 5px; }
        .wa-sub { font-size: 12px; font-weight: 400; opacity: 0.9; }

        footer { margin-top: 40px; font-size: 11px; color: #bdc3c7; text-align: center; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-area">
        <div class="logo">KBA</div>
        <div class="kba-sub">Tekamül Analiz Motoru</div>
    </div>

    <div id="sc1" class="screen active" style="text-align: center;">
        <input type="text" id="uName" placeholder="Ad Soyad" style="width:85%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd;"><br>
        <input type="number" id="uEbced" placeholder="Ebced Değeri" style="width:85%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd;"><br>
        <input type="date" id="uBirth" style="width:85%; padding:15px; margin-bottom:15px; border-radius:12px; border:1px solid #ddd;"><br>
        <button class="btn" onclick="runKBA()" style="background:var(--gold); color:white; padding:15px 40px; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">ANALİZİ BAŞLAT</button>
    </div>

    <div id="sc2" class="screen">
        <div id="header-info" style="text-align:center;">
            <h2 id="welcome" style="margin:0; color:var(--gold);"></h2>
            <div id="kodBadge" style="font-weight:700; color:#7f8c8d;"></div>
        </div>
        
        <div class="grid-container" id="nodes"></div>
        <div id="details"></div>

        <div id="waArea"></div>
        <button onclick="location.reload()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:12px; background:#eee; cursor:pointer;">YENİ ANALİZ</button>
    </div>

    <footer>© 2026 KB - KBA TEKAMÜL SİSTEMLERİ</footer>
</div>

<script>
    const houseTips = [
        "1. Ev (Şahsiyet): Karakter, dış dünya duruşu ve yaşam enerjisi.",
        "2. Ev (Rızık): Maddi kaynaklar, yetenekler ve öz değer.",
        "3. Ev (İletişim): Zihinsel yapı, kardeşler ve yakın çevre.",
        "4. Ev (Aile): Kökler, ev hayatı ve içsel güvenlik.",
        "5. Ev (Neşe): Yaratıcılık, çocuklar ve hayattan alınan keyif.",
        "6. Ev (Hizmet): Günlük rutin, sağlık ve sorumluluklar.",
        "7. Ev (Ortaklık): Evlilik, ortaklıklar ve ikili ilişkiler.",
        "8. Ev (Dönüşüm): Ortak kaynaklar, kriz yönetimi ve ruhsal derinlik.",
        "9. Ev (Vizyon): İnançlar, akademik gelişim ve uzak yolculuklar.",
        "10. Ev (Kariyer): Toplumsal statü, başarı ve yaşam amacı.",
        "11. Ev (Sosyal): Arkadaş grupları, idealler ve sosyal projeler.",
        "12. Ev (Bilinç): Bilinçaltı, maneviyat ve gizli güçler."
    ];

    const statusTips = {
        "OLUR": "Akışın açık olduğu, desteklendiğiniz verimli evre.",
        "SIKINTILI": "Enerjinin daraldığı, sabır ve dikkatle yönetilmesi gereken evre.",
        "OLMAZ": "Blokaj dönemi; yeni adım atmak yerine mevcut durumu koruma vaktidir.",
        "İSMİ AZAM": "Mühürlü alan; en yüksek koruma ve kolaylığın sağlandığı kapıdır."
    };

    const planetPool = [
        { g: "Mars", t: "Şahsiyet", esma: "Ya Malik Ya Kuddüs", mizaç: "Celal" },
        { g: "Venüs", t: "Rızık", esma: "Ya Kafi Ya Gani", mizaç: "Cemal" },
        { g: "Merkür", t: "İletişim", esma: "Ya Ali Ya Azim", mizaç: "İtidal" },
        { g: "Ay", t: "Aile", esma: "Ya Rahman Ya Rahim", mizaç: "Cemal" },
        { g: "Güneş", t: "Neşe", esma: "Ya Hay Ya Kayyum", mizaç: "Celal" },
        { g: "Merkür", t: "Hizmet", esma: "Ya Ali Ya Azim", mizaç: "İtidal" },
        { g: "Mars", t: "Ortaklık", esma: "Ya Malik Ya Kuddüs", mizaç: "Celal" },
        { g: "Venüs", t: "Dönüşüm", esma: "Ya Kafi Ya Gani", mizaç: "Cemal" },
        { g: "Jüpiter", t: "Vizyon", esma: "Ya Kebir Ya Müteal", mizaç: "İtidal" },
        { g: "Satürn", t: "Kariyer", esma: "Ya Fettah Ya Rezzak", mizaç: "Celal" },
        { g: "Satürn", t: "Sosyal", esma: "Ya Fettah Ya Rezzak", mizaç: "Celal" },
        { g: "Jüpiter", t: "Bilinç", esma: "Ya Kebir Ya Müteal", mizaç: "İtidal" }
    ];

    const zodiacs = ["Koç", "Boğa", "İkizler", "Yengeç", "Aslan", "Başak", "Terazi", "Akrep", "Yay", "Oğlak", "Kova", "Balık"];

    let results = [];
    let userZodiac = "";

    function runKBA() {
        const name = document.getElementById('uName').value;
        const ebced = document.getElementById('uEbced').value;
        const birthDate = new Date(document.getElementById('uBirth').value);
        
        const kod = (parseInt(ebced) % 9) || 9;
        const zodiacIdx = (birthDate.getMonth() === 2 && birthDate.getDate() >= 21) || birthDate.getMonth() > 2 ? (birthDate.getMonth() - 2) % 12 : (birthDate.getMonth() + 9) % 12;
        userZodiac = zodiacs[zodiacIdx];

        document.getElementById('sc1').classList.remove('active');
        document.getElementById('sc2').classList.add('active');
        document.getElementById('welcome').innerText = name.toUpperCase();
        document.getElementById('kodBadge').innerText = "KBA ANALİZ KODU: " + kod;

        const nodes = document.getElementById('nodes');
        nodes.innerHTML = "";
        results = [];

        for(let i=0; i<12; i++) {
            let h = planetPool[i];
            let status = (i + kod) % 4 === 0 ? "İSMİ AZAM" : (i % 3 === 0 ? "OLUR" : (i % 3 === 1 ? "SIKINTILI" : "OLMAZ"));
            results.push({...h, status, evNo: i+1});
            
            let color = status === "İSMİ AZAM" ? "var(--azam)" : (status === "OLUR" ? "var(--olur)" : (status === "SIKINTILI" ? "var(--sikinti)" : "var(--olmaz)"));
            nodes.innerHTML += `<div class="house-node" style="border-bottom: 6px solid ${color}" data-tip="${houseTips[i]}" onclick="viewDetail(${i})">${i+1}. EV<br><small>${h.t}</small></div>`;
        }
        viewDetail(0);
    }

    function viewDetail(i) {
        const d = results[i];
        let fitratNotu = "";
        
        // Esma Terkibi Fıtri Durum Analizi
        if(d.mizaç === "Celal") {
            fitratNotu = "Dışsallıktan Celal etki alınıyor; bu durum ifrat hallerde öfke ve baskıya, tefrit hallerde ise iradesizliğe neden olur. Dengelenmelidir.";
        } else if(d.mizaç === "Cemal") {
            fitratNotu = "İçsellikten Cemal etki alınıyor; ifrat hallerde aşırı hassasiyet ve bağımlılığa, tefrit hallerde ise duygusal donukluğa yol açabilir.";
        } else {
            fitratNotu = "İtidal dengesinde bir akış mevcut; ancak zihinsel dağınıklık (ifrat) veya kararsızlık (tefrit) riskine karşı odaklanma gereklidir.";
        }

        let color = d.status === "İSMİ AZAM" ? "var(--azam)" : (d.status === "OLUR" ? "var(--olur)" : (d.status === "SIKINTILI" ? "var(--sikinti)" : "var(--olmaz)"));
        
        document.getElementById('details').innerHTML = `
            <div class="detail-view">
                <span class="badge" style="background:${color}" data-tip="${statusTips[d.status]}">${d.status}</span>
                <h3 style="margin:0;">${d.evNo}. Ev: ${d.t}</h3>
                <p>Yönetici: ${d.g} | Arabi Gün: ${(i*2)+1}</p>
                <div class="analysis-box">
                    <strong>Esma Terkibi:</strong> ${d.esma}<br>
                    <strong>Fıtrat Analizi:</strong> ${fitratNotu}<br><br>
                    <strong>Tekamül Notu:</strong> ${d.status === "İSMİ AZAM" ? "Bu senin mühürlü alanındır. İsmi Azam kapısı açıktır." : "Rutin tekamül döngüsü."}
                </div>
            </div>`;

        // WhatsApp Mesajı Düzenleme
        const waMsg = encodeURIComponent(`${userZodiac} burcuyum. ${d.evNo}. evde ${d.status} durumum var. Bu durumun fıtratımdaki ifrat/tefrit hallerini nasıl düzenleyebilirim? Danışmanlık almak istiyorum.`);
        document.getElementById('waArea').innerHTML = `
            <a href="https://wa.me/905337381237?text=${waMsg}" target="_blank" class="wa-box">
                DANIŞMANLIK İÇİN WHATSAPP HATTI
                <span class="wa-sub">"${d.evNo}. Ev / ${d.status}" konusu hakkında uzman desteği alın.</span>
            </a>`;
    }
</script>
</body>
</html>
